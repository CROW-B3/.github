      - name: Trigger rogue-store deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CROW_DEPLOY_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'CROW-B3',
              repo: 'rogue-store',
              workflow_id: 'ci.yml',
              ref: 'main',
              inputs: {
                environment: '${{ inputs.environment }}',
                triggered_by: 'orchestrator'
              }
            });

  # ─── Summary ───────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs:
      - tier-1-core-auth
      - tier-2-core-user
      - tier-2-core-billing
      - tier-3-core-organization
      - tier-3-core-product
      - tier-3-core-notification
      - tier-3-core-analytics
      - tier-4-core-interaction
      - tier-4-core-pattern
      - tier-4-core-chat
      - tier-4-core-social-collector
      - tier-4-core-social-processor
      - tier-5-bff-chat
      - tier-5-bff-qna
      - tier-5-a2a
      - tier-5-mcp
      - tier-5-web-ingest
      - tier-5-cctv-ingest
      - tier-5-infra-crawl
      - tier-5-api-gateway
      - tier-6-auth-client
      - tier-6-dashboard-client
      - tier-6-landing-client
      - tier-6-rogue-store
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## CROW Platform Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tier | Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| T1 | core-auth-service | ${{ needs.tier-1-core-auth.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T2 | core-user-service | ${{ needs.tier-2-core-user.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T2 | core-billing-service | ${{ needs.tier-2-core-billing.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T3 | core-organization-service | ${{ needs.tier-3-core-organization.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T3 | core-product-service | ${{ needs.tier-3-core-product.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T3 | core-notification-service | ${{ needs.tier-3-core-notification.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T3 | core-analytics-service | ${{ needs.tier-3-core-analytics.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T4 | core-interaction-service | ${{ needs.tier-4-core-interaction.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T4 | core-pattern-service | ${{ needs.tier-4-core-pattern.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T4 | core-chat-service | ${{ needs.tier-4-core-chat.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T4 | core-social-collector | ${{ needs.tier-4-core-social-collector.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T4 | core-social-processor | ${{ needs.tier-4-core-social-processor.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T5 | bff-chat-service | ${{ needs.tier-5-bff-chat.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T5 | bff-qna-service | ${{ needs.tier-5-bff-qna.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T5 | a2a-service | ${{ needs.tier-5-a2a.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T5 | mcp-service | ${{ needs.tier-5-mcp.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T5 | web-ingest-service | ${{ needs.tier-5-web-ingest.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T5 | cctv-ingest-service | ${{ needs.tier-5-cctv-ingest.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T5 | infra-crawl-service | ${{ needs.tier-5-infra-crawl.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T5 | core-api-gateway | ${{ needs.tier-5-api-gateway.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T6 | auth-client | ${{ needs.tier-6-auth-client.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T6 | dashboard-client | ${{ needs.tier-6-dashboard-client.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T6 | landing-client | ${{ needs.tier-6-landing-client.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| T6 | rogue-store | ${{ needs.tier-6-rogue-store.result }} |" >> $GITHUB_STEP_SUMMARY

# Orchestrated deployment across all CROW services in dependency order.
# Triggered manually or by repository dispatch from individual service repos.
#
# Dependency order:
#   Tier 1 (no deps):       core-auth-service
#   Tier 2 (depends on T1): core-user-service, core-billing-service
#   Tier 3 (depends on T2): core-organization-service, core-product-service,
#                            core-notification-service, core-analytics-service
#   Tier 4 (depends on T3): core-interaction-service, core-pattern-service,
#                            core-chat-service, core-social-collector,
#                            core-social-processor
#   Tier 5 (BFF/infra):     bff-chat-service, bff-qna-service, a2a-service,
#                            mcp-service, web-ingest-service, cctv-ingest-service,
#                            infra-crawl-service, core-api-gateway
#   Tier 6 (clients):       auth-client, dashboard-client, landing-client, rogue-store

name: Orchestrated Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - production
        default: dev
      deploy_tier:
        description: "Deploy up to tier (1-6, or 'all')"
        required: false
        type: string
        default: "all"
      services_filter:
        description: "Comma-separated service names to deploy (empty = all)"
        required: false
        type: string
        default: ""

permissions:
  actions: write
  contents: read

env:
  GH_TOKEN: ${{ secrets.CROW_DEPLOY_TOKEN }}

jobs:
  # ─── Tier 1: Auth foundation ───────────────────────────────────────
  tier-1-core-auth:
    name: "T1: core-auth-service"
    runs-on: ubuntu-latest
    if: |
      (inputs.services_filter == '' || contains(inputs.services_filter, 'core-auth-service'))
    steps:
      - name: Trigger core-auth-service deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CROW_DEPLOY_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'CROW-B3',
              repo: 'core-auth-service',
              workflow_id: 'ci.yml',
              ref: 'main',
              inputs: {
                environment: '${{ inputs.environment }}',
                triggered_by: 'orchestrator'
              }
            });

  # ─── Tier 2: User & Billing (depend on Auth) ──────────────────────
  tier-2-core-user:
    name: "T2: core-user-service"
    runs-on: ubuntu-latest
    needs: [tier-1-core-auth]
    if: |
      always() &&
      (needs.tier-1-core-auth.result == 'success' || needs.tier-1-core-auth.result == 'skipped') &&
      (inputs.deploy_tier == 'all' || inputs.deploy_tier >= '2') &&
      (inputs.services_filter == '' || contains(inputs.services_filter, 'core-user-service'))
    steps:
      - name: Trigger core-user-service deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CROW_DEPLOY_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'CROW-B3',
              repo: 'core-user-service',
              workflow_id: 'ci.yml',
              ref: 'main',
              inputs: {
                environment: '${{ inputs.environment }}',
                triggered_by: 'orchestrator'
              }
            });

  tier-2-core-billing:
